version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: mcpify
    main: .
    binary: mcpify
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - id: mcpify
    name_template: "mcpify_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: aloki-alok
    name: mcpify

changelog:
  use: github
